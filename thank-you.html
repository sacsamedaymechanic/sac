<style>
  :root {
    --black:#0D0D0D; --charcoal:#1A1A1A; --border:#333; --orange:#F26419;
    --orange-dark:#C4500F; --white:#FFF; --body:#D8D8D8; --muted:#999; --green:#3CBB60;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--black); color:var(--body);
    font-family:'Barlow',sans-serif; min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:24px; text-align:center;
    background-image: radial-gradient(circle at 50% 0%, rgba(242,100,25,0.12) 0%, transparent 55%);
  }
  .card {
    max-width:560px; width:100%;
    background:var(--charcoal); border:1px solid var(--border);
    border-radius:16px; padding:48px 40px;
    animation: rise 0.5s ease;
  }
  @keyframes rise { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  .logo { width:88px; height:88px; border-radius:50%; margin:0 auto 24px; display:block; }
  .check {
    width:72px; height:72px; margin:0 auto 24px;
    background:rgba(60,187,96,0.15); border:2px solid var(--green);
    border-radius:50%; display:flex; align-items:center; justify-content:center;
    color:var(--green);
  }
  h1 {
    font-family:'Barlow Condensed',sans-serif; font-weight:900;
    font-size:48px; color:var(--white); text-transform:uppercase;
    line-height:1; margin-bottom:16px;
  }
  h1 em { color:var(--orange); font-style:normal; }
  p.lead { font-size:18px; color:var(--body); margin-bottom:8px; line-height:1.6; }
  p.sub { font-size:15px; color:var(--muted); margin-bottom:32px; }
  .urgent {
    background:rgba(242,100,25,0.1); border:1px solid var(--orange);
    border-radius:10px; padding:22px; margin-bottom:28px;
  }
  .urgent-label {
    font-family:'Barlow Condensed',sans-serif; font-weight:700;
    font-size:13px; letter-spacing:0.15em; text-transform:uppercase;
    color:var(--orange); margin-bottom:10px;
  }
  .urgent-phone {
    font-family:'Barlow Condensed',sans-serif; font-weight:900;
    font-size:34px; color:var(--white); letter-spacing:0.02em;
    display:block; text-decoration:none; line-height:1.1;
  }
  .btns { display:flex; gap:12px; flex-direction:column; }
  .btn {
    display:flex; align-items:center; justify-content:center; gap:10px;
    font-family:'Barlow Condensed',sans-serif; font-weight:700;
    font-size:19px; text-transform:uppercase; letter-spacing:0.03em;
    padding:15px 28px; border-radius:6px; text-decoration:none;
    transition:background 0.2s, border-color 0.2s, color 0.2s;
  }
  .btn-primary { background:var(--orange); color:var(--white); }
  .btn-primary:hover { background:var(--orange-dark); }
  .btn-outline { background:transparent; color:var(--white); border:2px solid var(--border); }
  .btn-outline:hover { border-color:var(--orange); color:var(--orange); }
  .home-link {
    display:inline-block; margin-top:26px; color:var(--muted);
    font-size:14px; text-decoration:none; letter-spacing:0.03em;
  }
  .home-link:hover { color:var(--orange); }
  @media (max-width:480px) {
    .card { padding:36px 24px; }
    h1 { font-size:38px; }
    .urgent-phone { font-size:28px; }
  }
</style>
</head>
